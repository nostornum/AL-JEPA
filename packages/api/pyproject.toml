[project]
name = "songen-api"
version = "0.1.0"
description = "Music genre classification - FastAPI inference server"
requires-python = ">=3.13"
dependencies = ["fastapi[standard]>=0.115.14", "songen-core"]

[project.scripts]
songen-api = "songen.api:server.main"

[tool.uv.sources]
songen-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/songen"]
