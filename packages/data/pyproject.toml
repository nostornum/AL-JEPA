[project]
name = "songen-data"
version = "0.1.0"
description = "Song genre classification - audio dataset processing utilities"
authors = [{ name = "nostornum", email = "nostornum@gmail.com" }]
requires-python = ">=3.13"
dependencies = [
    "dagster>=1.13.6",
    "dagster-dg-cli>=1.13.6",
    "dagster-webserver>=1.13.6",
    "huggingface-hub>=1.14.0",
    "torchaudio>=2.11.0",
    "torchcodec>=0.13.0",
]

[project.scripts]
songen-data = "songen.data:main"

[tool.dg]
directory_type = "project"

[tool.dg.project]
root_module = "songen.data"
code_location_name = "songen.data"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/songen"]
