[project]
name = "songen-core"
version = "0.1.0"
description = "Song genre classification - model, training, shared transforms"
authors = [{ name = "nostornum", email = "nostornum@gmail.com" }]
requires-python = ">=3.13"
dependencies = [
    "accelerate>=1.13.0",
    "einx[torch]>=0.4.3",
    "matplotlib>=3.10.9",
    "msgspec>=0.21.1",
    "safetensors>=0.7.0",
    "torch>=2.12.0",
    "torchvision>=0.27.0",
    "tqdm>=4.67.3",
    "tyro>=1.0.13",
    "wandb[media]>=0.26.1",
]

[project.scripts]
songen = "songen.core:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/songen"]
