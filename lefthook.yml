commit-msg:
  jobs:
    - name: conventional-commit
      run: uv run gitlint --msg-filename {1}

pre-commit:
  parallel: true
  jobs:
    - name: check
      group:
        piped: true
        jobs:
          - name: format
            glob: "*.{py,ipynb}"
            run: uv run ruff format {staged_files}
            stage_fixed: true
          - name: lint
            glob: "*.{py,ipynb}"
            run: uv run ruff check --fix {staged_files}
            stage_fixed: true
          - name: typecheck
            glob: "*.{py,ipynb}"
            run: uv run ty check {staged_files}
    - name: deps
      glob: "pyproject.toml"
      group:
        piped: true
        jobs:
          - run: uv lock
            stage_fixed: true
          - run: uv export --all-packages --no-hashes --quiet -o requirements.txt
            stage_fixed: true
          - run: git add uv.lock requirements.txt
    - name: test
      glob: "*.py"
      run: uv run pytest -x -q; ec=$?; [ $ec -eq 5 ] && exit 0 || exit $ec
